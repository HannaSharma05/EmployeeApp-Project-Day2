
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Raise Salary</title>
	<link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { font-family: Arial; margin: 40px; }
        .error { color: red; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 150px; }
        select, input { padding: 5px; }
    </style>
</head>
<body>
    <h1>Raise Salary</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div th:if="${employees.isEmpty()}">
        <p class="error">No employees to raise salary. <a href="/create">Create one first.</a></p>
        <a href="/">← Back to menu</a>
    </div>

    <form th:action="@{/raise}" th:object="${raiseRequest}" method="post" th:unless="${employees.isEmpty()}">
        <div class="form-group">
            <label>Select Employee:</label>
            <select th:field="*{employeeId}">
                <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name} + ' (ID: ' + ${emp.id} + ')'"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Percentage Increase (%):</label>
            <input type="number" th:field="*{percentage}" step="0.01" min="0" required/>
        </div>
        <button type="submit">Raise Salary</button>
    </form>
    <br>
    <a href="/">← Back to menu</a>
</body>
</html>
